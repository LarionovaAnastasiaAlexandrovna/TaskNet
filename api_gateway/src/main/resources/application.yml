server:
  port: 8081

spring:
  main:
    web-application-type: reactive
    allow-bean-definition-overriding: true
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: project-service
          uri: http://localhost:8083
          predicates:
            - Path=/project/**
        - id: task-service
          uri: http://localhost:8084
          predicates:
            - Path=/task/**
        - id: user-service
          uri: http://localhost:8085  # Указываем реальный URL сервиса
          predicates:
            - Path=/user/**   # Все запросы по пути /user/** перенаправляем на этот сервис
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html