server:
  port: 8081

cors:
  enabled: true
  paths:
    - "/**"
  origins:
    - "http://localhost:5173"
  methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  headers:
    - "*"
  allow-credentials: true

spring:
  main:
    web-application-type: servlet
    allow-bean-definition-overriding: true
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: project-service
          uri: http://localhost:8083
          predicates:
            - Path=/project/**
        - id: task-service
          uri: http://localhost:8084
          predicates:
            - Path=/task/**
        - id: user-service
          uri: http://localhost:8085  # Указываем реальный URL сервиса
          predicates:
            - Path=/user/**   # Все запросы по пути /user/** перенаправляем на этот сервис
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html

  mail:
    host: smtp.mail.ru
    port: 465
    username: lnastya.l@mail.ru
    password: j2eXBzUnkvTPl5WcbRvh
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
app:
  verification:
    url: http://localhost:8081/auth/verify?token=

inner:
  auth:
    url: http://localhost:8082/innerprosses

